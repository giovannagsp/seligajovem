<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>StudyLink | Login</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  
    const firebaseConfig = {
      apiKey: "SUA_API_KEY",
      authDomain: "SEU_DOMINIO",
      projectId: "SEU_PROJECT_ID",
      storageBucket: "SEU_BUCKET",
      messagingSenderId: "SEU_ID",
      appId: "SEU_APP_ID"
    };
  
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
  
    // Tornando as funções acessíveis para o script tradicional abaixo
    window.auth = auth;
    window.signInWithEmailAndPassword = signInWithEmailAndPassword;
  </script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      color-scheme: light;
      --primary: #2563eb;
      --success: #10b981;
      --bg: #f4f6fb;
      --surface: #ffffff;
      --text: #172033;
      --muted: #647084;
      --border: #dbe3ef;
      --danger: #dc2626;
      --shadow: 0 20px 48px rgba(15, 23, 42, 0.1);
      --header-bg: rgba(255, 255, 255, 0.9);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        color-scheme: dark;
        --primary: #60a5fa;
        --success: #34d399;
        --bg: #0f172a;
        --surface: #162033;
        --text: #e5edf9;
        --muted: #a9b4c7;
        --border: #2a3952;
        --danger: #f87171;
        --shadow: 0 20px 48px rgba(0, 0, 0, 0.36);
        --header-bg: rgba(15, 23, 42, 0.9);
      }
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', Arial, sans-serif;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 18px 8%;
      background: var(--header-bg);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(14px);
    }

    .logo {
      color: var(--primary);
      font-size: 22px;
      font-weight: 800;
      text-decoration: none;
    }

    nav {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    nav a {
      padding: 8px 11px;
      border-radius: 8px;
      color: var(--muted);
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
    }

    nav a:hover {
      color: var(--primary);
      background: color-mix(in srgb, var(--primary) 12%, transparent);
    }

    main {
      flex: 1;
      display: grid;
      place-items: center;
      padding: 48px 8%;
    }

    .form-box {
      width: min(420px, 100%);
      padding: 36px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    h1 {
      margin-bottom: 8px;
      color: var(--primary);
      font-size: 30px;
      text-align: center;
    }

    .subtitle {
      margin-bottom: 26px;
      color: var(--muted);
      text-align: center;
    }

    .input-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      font-size: 14px;
      font-weight: 700;
    }

    input {
      width: 100%;
      min-height: 46px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      font: inherit;
      outline: none;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--primary) 16%, transparent);
    }

    button {
      width: 100%;
      min-height: 48px;
      margin-top: 8px;
      border: 0;
      border-radius: 8px;
      background: var(--success);
      color: white;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    .error {
      min-height: 22px;
      margin-top: 14px;
      color: var(--danger);
      font-size: 14px;
      font-weight: 700;
      text-align: center;
    }

    .signup-link {
      margin-top: 18px;
      color: var(--muted);
      font-size: 14px;
      text-align: center;
    }

    .signup-link a {
      color: var(--primary);
      font-weight: 800;
      text-decoration: none;
    }

    footer {
      padding: 20px 8%;
      background: #111827;
      color: #b8c1d1;
      font-size: 14px;
      text-align: center;
    }

    @media (max-width: 700px) {
      header {
        align-items: flex-start;
        flex-direction: column;
        padding: 16px 6%;
      }

      main {
        padding: 34px 6%;
      }
    }
  </style>
</head>

<body>
  <header>
    <a class="logo" href="index.html">StudyLink</a>

    <nav aria-label="Navegação principal">
      <a href="index.html">Início</a>
      <a href="forum.html">Fórum</a>
      <a href="materiais.html">Materiais</a>
      <a href="mentoria.html">Mentoria</a>
    </nav>
  </header>

  <main>
    <form class="form-box" id="loginForm">
      <h1>Entrar</h1>
      <p class="subtitle">Use o email e a senha criados no cadastro.</p>

      <div class="input-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          autocomplete="username"
          placeholder="Digite seu email"
          required
        >
      </div>

      <div class="input-group">
        <label for="password">Senha</label>
        <input
          id="password"
          type="password"
          autocomplete="current-password"
          placeholder="Digite sua senha"
          required
        >
      </div>

      <button type="submit" id="loginBtn">Entrar</button>

      <p class="error" id="errorMessage" role="alert"></p>

      <p class="signup-link">
        Ainda não tem conta?
        <a href="criar-conta.html">Criar conta</a>
      </p>
    </form>
  </main>

  <footer>
    <p>StudyLink - Plataforma colaborativa de estudos</p>
  </footer>

  <script>
    const form = document.getElementById("loginForm");
    const errorMessage = document.getElementById("errorMessage");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");
  
    form.addEventListener("submit", async function (event) {
      event.preventDefault();
      errorMessage.textContent = "";
  
      if (!form.checkValidity()) {
        form.reportValidity();
        return;
      }
  
      const email = emailInput.value.trim().toLowerCase();
      const password = passwordInput.value;

      loginBtn.disabled = true;
      errorMessage.textContent = "Verificando credenciais...";
  
      try {
        // Realiza o login direto na nuvem do Firebase
        await window.signInWithEmailAndPassword(window.auth, email, password);
        
        // Seta as flags locais apenas para controle simples da interface nas páginas
        localStorage.setItem("usuarioLogado", "true");
        
        // Redireciona com sucesso para a tela de Perfil
        window.location.href = "perfil.html";

      } catch (error) {
        console.error("Erro no Firebase Login:", error);
        loginBtn.disabled = false;

        // Trata os erros clássicos do Auth
        if (error.code === "auth/invalid-credential" || error.code === "auth/user-not-found" || error.code === "auth/wrong-password") {
          errorMessage.textContent = "Email ou senha incorretos.";
        } else if (error.code === "auth/invalid-email") {
          errorMessage.textContent = "Formato de e-mail inválido.";
        } else {
          errorMessage.textContent = "Erro ao entrar: " + error.message;
        }
      }
    });
  </script>
  
  </body>
  </html>
