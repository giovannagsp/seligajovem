<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">

  <title>Study Community | Perfil</title>

  <link rel="icon" type="image/png" href="favicon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  
    const firebaseConfig = {
      apiKey: "SUA_API_KEY",
      authDomain: "SEU_DOMINIO",
      projectId: "SEU_PROJECT_ID",
      storageBucket: "SEU_BUCKET",
      messagingSenderId: "SEU_ID",
      appId: "SEU_APP_ID"
    };
  
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
  
    // Deixar as referências e funções acessíveis globalmente
    window.auth = auth;
    window.db = db;
    window.signOut = signOut;
    window.onAuthStateChanged = onAuthStateChanged;
    window.doc = doc;
    window.getDoc = getDoc;
    window.updateDoc = updateDoc;
  </script>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    color-scheme: light;
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --success: #10b981;
    --danger: #ef4444;
    --bg: #f4f6fb;
    --surface: #ffffff;
    --surface-soft: #eef2ff;
    --text: #172033;
    --muted: #647084;
    --border: #dbe3ef;
    --shadow: 0 20px 48px rgba(15, 23, 42, 0.1);
    --header-bg: rgba(255, 255, 255, 0.9);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      color-scheme: dark;
      --primary: #60a5fa;
      --primary-dark: #93c5fd;
      --success: #34d399;
      --danger: #f87171;
      --bg: #0f172a;
      --surface: #162033;
      --surface-soft: #111c30;
      --text: #e5edf9;
      --muted: #a9b4c7;
      --border: #2a3952;
      --shadow: 0 20px 48px rgba(0, 0, 0, 0.36);
      --header-bg: rgba(15, 23, 42, 0.9);
    }
  }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', Arial, Helvetica, sans-serif;
    line-height: 1.5;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    padding: 18px 8%;
    background: var(--header-bg);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(14px);
  }

  .logo {
    color: var(--primary);
    font-size: 22px;
    font-weight: 800;
    text-decoration: none;
    white-space: nowrap;
  }

  nav {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    flex-wrap: wrap;
  }

  nav a,
  nav button {
    padding: 8px 11px;
    border: 0;
    border-radius: 8px;
    background: transparent;
    color: var(--muted);
    font: inherit;
    font-size: 15px;
    font-weight: 600;
    text-decoration: none;
    cursor: pointer;
  }

  nav a:hover,
  nav button:hover {
    color: var(--primary);
    background: color-mix(in srgb, var(--primary) 12%, transparent);
  }

  main {
    flex: 1;
    padding: 46px 8%;
  }

  .profile-layout {
    width: min(1120px, 100%);
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 24px;
    margin: 0 auto;
  }

  .identity-panel {
    border: 1px solid var(--border);
    border-radius: 16px;
    background: var(--surface);
    box-shadow: var(--shadow);
    position: sticky;
    top: 98px;
    align-self: start;
    overflow: hidden;
  }

  .identity-cover {
    min-height: 120px;
    background:
      linear-gradient(135deg, rgba(37, 99, 235, 0.92), rgba(16, 185, 129, 0.78)),
      url('img/banner.jpg') center/cover no-repeat;
  }

  .identity-body {
    padding: 0 24px 24px;
    text-align: center;
  }

  .avatar {
    width: 144px;
    height: 144px;
    display: grid;
    place-items: center;
    overflow: hidden;
    margin: -72px auto 16px;
    border: 6px solid var(--surface);
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--success));
    color: white;
    font-size: 44px;
    font-weight: 800;
    box-shadow: 0 18px 34px rgba(15, 23, 42, 0.22);
  }

  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  h1 {
    color: var(--text);
    font-size: 30px;
    line-height: 1.12;
    word-break: break-word;
  }

  .email {
    margin-top: 8px;
    color: var(--primary);
    font-size: 14px;
    font-weight: 700;
    word-break: break-word;
  }

  .role-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 34px;
    margin: 16px 0;
    padding: 8px 12px;
    border-radius: 999px;
    background: color-mix(in srgb, var(--primary) 12%, transparent);
    color: var(--primary);
    font-size: 14px;
    font-weight: 800;
  }

  .bio {
    color: var(--muted);
    font-size: 15px;
  }

  .identity-actions {
    display: grid;
    gap: 10px;
    margin-top: 22px;
  }

  .button {
    display: inline-flex;
    min-height: 42px;
    align-items: center;
    justify-content: center;
    padding: 10px 14px;
    border: 0;
    border-radius: 8px;
    background: var(--primary);
    color: white;
    font: inherit;
    font-weight: 800;
    cursor: pointer;
  }

  .button:hover {
    transform: translateY(-2px);
    background: var(--primary-dark);
  }

  .button.secondary {
    background: var(--surface-soft);
    color: var(--text);
  }

  .button.danger {
    background: var(--danger);
    color: white;
  }

  .dashboard {
    display: grid;
    gap: 24px;
  }

  .welcome {
    padding: 28px;
    border: 1px solid var(--border);
    border-radius: 16px;
    background:
      linear-gradient(135deg,
        color-mix(in srgb, var(--primary) 14%, transparent),
        color-mix(in srgb, var(--success) 12%, transparent)
      ),
      var(--surface);
    box-shadow: var(--shadow);
  }

  .welcome h2 {
    margin-bottom: 8px;
    font-size: clamp(28px, 4vw, 40px);
  }

  .welcome p {
    max-width: 720px;
    color: var(--muted);
    font-size: 16px;
  }

  dialog {
    width: min(520px, calc(100% - 28px));
    margin: auto;
    border: 1px solid var(--border);
    border-radius: 14px;
    background: var(--surface);
    box-shadow: var(--shadow);
  }

  dialog::backdrop {
    background: rgba(15, 23, 42, 0.62);
  }

  .edit-form {
    padding: 26px;
  }

  .input-group {
    margin-bottom: 15px;
  }

  .input-group label {
    display: block;
    margin-bottom: 7px;
    font-weight: 800;
  }

  .input-group input,
  .input-group textarea,
  .input-group select {
    width: 100%;
    min-height: 44px;
    padding: 11px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    color: var(--text);
  }

  .edit-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 20px;
  }

  footer {
    padding: 20px 8%;
    background: #111827;
    color: #b8c1d1;
    text-align: center;
  }

  @media (max-width: 940px) {
    .profile-layout {
      grid-template-columns: 1fr;
    }

    .identity-panel {
      position: static;
    }
  }

  @media (max-width: 720px) {
    header {
      flex-direction: column;
      align-items: flex-start;
    }

    main {
      padding: 34px 6%;
    }
  }
</style>

<body>
  <header>
    <a class="logo" href="index.html">Study Community</a>

    <nav aria-label="Navegação principal">
      <a href="index.html">Início</a>
      <a href="forum.html">Fórum</a>
      <a href="materiais.html">Materiais</a>
      <a href="perfil.html">Perfil</a>

      <button id="logoutBtn" type="button">Sair</button>
    </nav>
  </header>

  <main id="profileRoot">
    <div style="text-align: center; padding: 40px; color: var(--muted);">Carregando perfil...</div>
  </main>

  <dialog id="editDialog">
    <form class="edit-form" id="editForm">
      <h2>Editar Perfil</h2>

      <div class="input-group">
        <label for="editName">Nome de usuário</label>
        <input id="editName" type="text" maxlength="32" required>
      </div>

      <div class="input-group">
        <label for="editBio">Biografia</label>
        <textarea id="editBio" maxlength="220" required style="width: 100%; min-height: 100px; padding: 11px; border: 1px solid var(--border); border-radius: 8px; resize: vertical;"></textarea>
      </div>

      <div class="input-group">
        <label for="editUserType">Tipo de usuário</label>
        <select id="editUserType" required>
          <option value="estudante">Estudante</option>
          <option value="professor">Professor</option>
        </select>
      </div>

      <div class="input-group">
        <label for="editPhoto">Foto de perfil</label>
        <input id="editPhoto" type="file" accept="image/*">
      </div>

      <div class="edit-actions">
        <button class="button secondary" id="cancelEdit" type="button">Cancelar</button>
        <button class="button" type="submit" id="saveEditBtn">Salvar alterações</button>
      </div>
    </form>
  </dialog>

  <footer>
    <p>Study Community - Plataforma colaborativa de estudos</p>
  </footer>
</body>

<script>
  const logoutBtn = document.getElementById("logoutBtn");

  // FUNÇÃO DE LOGOUT ATUALIZADA
  async function logout() {
    try {
      if (window.auth) {
        await window.signOut(window.auth);
      }
    } catch (e) {
      console.error("Erro ao deslogar do Firebase:", e);
    }
    localStorage.removeItem("studylinkCurrentUser");
    localStorage.setItem("usuarioLogado", "false");
    window.location.href = "login.html";
  }

  if (logoutBtn) {
    logoutBtn.addEventListener("click", logout);
  }

  const profileRoot = document.getElementById("profileRoot");
  const editDialog = document.getElementById("editDialog");
  const editForm = document.getElementById("editForm");
  const cancelEdit = document.getElementById("cancelEdit");
  const editName = document.getElementById("editName");
  const editBio = document.getElementById("editBio");
  const editUserType = document.getElementById("editUserType");
  const editPhoto = document.getElementById("editPhoto");
  const saveEditBtn = document.getElementById("saveEditBtn");

  const roleLabels = {
    estudante: "Aluno",
    mentor: "Mentor",
    professor: "Professor"
  };

  const roleDescriptions = {
    estudante: "Participa da comunidade para aprender, revisar conteúdos e tirar dúvidas.",
    mentor: "Ajuda outros alunos compartilhando conhecimento e experiências.",
    professor: "Organiza conteúdos e acompanha a evolução da turma."
  };

  function escapeHtml(value) {
    return String(value || "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function getInitials(name) {
    return String(name || "SL")
      .trim()
      .split(/\s+/)
      .slice(0, 2)
      .map(p => p[0])
      .join("")
      .toUpperCase();
  }

  function normalizeUserType(type) {
    if (type === "professor") return "professor";
    if (type === "mentor") return "mentor";
    return "estudante";
  }

  function renderEmptyState() {
    profileRoot.innerHTML = `
      <section class="empty" style="text-align: center; padding: 40px;">
        <h1>Nenhum perfil conectado</h1>
        <p style="color: var(--muted); margin: 10px 0 20px;">Faça login ou crie uma conta para acessar seu perfil.</p>
        <a class="button" href="login.html" style="text-decoration: none;">Entrar</a>
      </section>
    `;
  }

  function renderProfile(user) {
    const roleKey = normalizeUserType(user.userType);

    const name = escapeHtml(user.username);
    const email = escapeHtml(user.email);
    const bio = escapeHtml(user.bio);

    const avatar = user.profilePhoto
      ? `<img src="${user.profilePhoto}" alt="Foto de perfil">`
      : getInitials(user.username);

    profileRoot.innerHTML = `
      <section class="profile-layout">
        <aside class="identity-panel">
          <div class="identity-cover"></div>

          <div class="identity-body">
            <div class="avatar">${avatar}</div>
            <h1>${name}</h1>
            <p class="email">${email}</p>

            <span class="role-badge">${roleLabels[roleKey]}</span>
            <p class="bio">${bio}</p>

            <div class="identity-actions">
              <button class="button" data-edit>Editar Perfil</button>
              <button class="button danger" data-logout>Sair</button>
            </div>
          </div>
        </aside>

        <div class="dashboard">
          <section class="welcome">
            <h2>Painel de ${name}</h2>
            <p>${roleDescriptions[roleKey]}</p>
          </section>
        </div>
      </section>
    `;

    document.querySelector("[data-edit]").addEventListener("click", openEditProfile);
    document.querySelector("[data-logout]").addEventListener("click", logout);
  }

  let localUserData = null; // Guardará o snapshot do usuário atual em memória

  function openEditProfile() {
    if (!localUserData) return;
    editName.value = localUserData.username || "";
    editBio.value = localUserData.bio || "";
    editUserType.value = normalizeUserType(localUserData.userType);
    editPhoto.value = "";
    editDialog.showModal();
  }

  // MONITOR DE SESSÃO DO FIREBASE (SESSÃO EM NUVEM)
  document.addEventListener("DOMContentLoaded", () => {
    // Espera um segundo para garantir que o script do Firebase no head carregou e injetou as globais
    const checkFirebase = setInterval(() => {
      if (window.onAuthStateChanged && window.auth) {
        clearInterval(checkFirebase);

        window.onAuthStateChanged(window.auth, async (user) => {
          if (user) {
            try {
              // Busca os dados complementares do usuário no Firestore usando o UID dele
              const userDocRef = window.doc(window.db, "usuarios", user.uid);
              const userDocSnap = await window.getDoc(userDocRef);

              if (userDocSnap.exists()) {
                localUserData = userDocSnap.data();
                renderProfile(localUserData);
              } else {
                // Fallback caso o registro no Auth exista mas não no Firestore
                localUserData = {
                  uid: user.uid,
                  username: "Usuário",
                  email: user.email,
                  bio: "Sem biografia ainda.",
                  userType: "estudante",
                  profilePhoto: ""
                };
                renderProfile(localUserData);
              }
            } catch (err) {
              console.error("Erro ao buscar documento no Firestore:", err);
              renderEmptyState();
            }
          } else {
            renderEmptyState();
          }
        });
      }
    }, 100);
  });

  // SUBMIT DO FORMULÁRIO DE EDIÇÃO SALVANDO DIRETAMENTE NO FIRESTORE
  editForm.addEventListener("submit", (e) => {
    e.preventDefault();
    if (!localUserData || !localUserData.uid) return;

    saveEditBtn.disabled = true;

    const applyEdits = async (photoBase64) => {
      try {
        const userDocRef = window.doc(window.db, "usuarios", localUserData.uid);
        
        const updatedData = {
          username: editName.value.trim(),
          bio: editBio.value.trim(),
          userType: normalizeUserType(editUserType.value)
        };

        if (photoBase64) {
          updatedData.profilePhoto = photoBase64;
        }

        // Atualiza diretamente no banco na nuvem
        await window.updateDoc(userDocRef, updatedData);

        // Atualiza a nossa cópia em memória e renderiza a tela novamente
        localUserData = { ...localUserData, ...updatedData };
        renderProfile(localUserData);
        
        saveEditBtn.disabled = false;
        editDialog.close();

      } catch (error) {
        console.error("Erro ao salvar alterações no Firestore:", error);
        alert("Erro ao salvar alterações na nuvem. Tente novamente.");
        saveEditBtn.disabled = false;
      }
    };

    const file = editPhoto.files[0];

    if (!file) {
      applyEdits(null);
    } else {
      const reader = new FileReader();
      reader.onload = () => {
        applyEdits(String(reader.result));
      };
      reader.readAsDataURL(file);
    }
  });

  cancelEdit.addEventListener("click", () => {
    editDialog.close();
  });
</script>
</html>
